<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gestão de Pacientes</title>

    <!-- ÍCONES -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="css/global.css">

    <link rel="stylesheet" href="css/pacientes.css">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <!-- LOGO -->

            <div class="logo">

                <img src="img/logo.png" alt="Logo SaúdeTECH">

            </div>

            <!-- MENU -->

            <nav class="menu">

                <a href="dashboard-publico.html">

                    <i class="fa-solid fa-tv"></i>

                    <span>Dashboard</span>

                </a>

                <a href="menu-principal.html">

                    <i class="fa-solid fa-house"></i>

                    <span>Menu Principal</span>

                </a>

                <a href="pacientes.html" class="active">

                    <i class="fa-regular fa-user"></i>

                    <span>Pacientes</span>

                </a>

                <a href="atendimentos.html">

                    <i class="fa-regular fa-calendar-check"></i>

                    <span>Atendimentos</span>

                </a>

                <a href="receituario.html">

                    <i class="fa-regular fa-file-lines"></i>

                    <span>Receituário</span>

                </a>

                <a href="relatorios.html">

                    <i class="fa-regular fa-chart-bar"></i>

                    <span>Relatórios</span>

                </a>

                <a href="laudos.html">

                    <i class="fa-regular fa-file"></i>

                    <span>Laudos</span>

                </a>

                <a href="login.html">

                    <i class="fa-solid fa-arrow-right-from-bracket"></i>

                    <span>Sair</span>

                </a>

            </nav>

        </aside>

        <!-- MAIN -->

        <main class="main">

            <!-- CARD -->

            <div class="card-pacientes">

                <!-- TOPO -->

                <div class="topo">

                    <div>

                        <h1>
                            Gestão de Pacientes
                        </h1>

                    </div>

                    <a href="cadastrar-paciente.html" class="btn-novo">

                        <i class="fa-solid fa-plus"></i>

                        Novo Paciente

                    </a>

                </div>

                <!-- FILTROS -->

                <div class="filtros">

                    <!-- BUSCA -->

                    <div class="grupo-busca">

                        <input type="text" id="buscarPaciente" placeholder="Buscar paciente...">

                        <i class="fa-solid fa-magnifying-glass"></i>

                    </div>

                    <!-- BAIRRO -->

                    <select>

                        <option>
                            Todos os bairros
                        </option>

                        <option>
                            Centro
                        </option>

                        <option>
                            Zona Rural
                        </option>

                    </select>

                    <!-- STATUS -->

                    <select>

                        <option>
                            Todos
                        </option>

                        <option>
                            Ativos
                        </option>

                        <option>
                            Inativos
                        </option>

                    </select>

                </div>

                <!-- TABELA -->

                <div class="tabela-container">

                    <table>

                        <thead>

                            <tr>

                                <th>Nome</th>
                                <th>CPF</th>
                                <th>Telefone</th>
                                <th>Status</th>
                                <th>Ações</th>

                            </tr>

                        </thead>

                        <tbody id="tbodyPacientes">

                        </tbody>

                    </table>

                </div>

                <!-- PAGINAÇÃO -->

                <div class="paginacao">

                    <button>
                        <i class="fa-solid fa-angles-left"></i>
                    </button>

                    <button>
                        <i class="fa-solid fa-angle-left"></i>
                    </button>

                    <button class="ativo">
                        1
                    </button>

                    <button>2</button>

                    <button>3</button>

                    <button>
                        <i class="fa-solid fa-angle-right"></i>
                    </button>

                    <button>
                        <i class="fa-solid fa-angles-right"></i>
                    </button>

                </div>

            </div>

        </main>

    </div>

    <script src="js/pacientes.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Relatórios</title>

    <!-- ÍCONES -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="css/global.css">

    <link rel="stylesheet" href="css/relatorios.css">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <!-- LOGO -->

            <div class="logo">

                <img src="img/logo.png" alt="Logo">

            </div>

            <!-- MENU -->

            <nav class="menu">

                <a href="dashboard-publico.html">

                    <i class="fa-solid fa-tv"></i>

                    <span>Dashboard</span>

                </a>

                <a href="menu-principal.html">

                    <i class="fa-solid fa-house"></i>

                    <span>Menu Principal</span>

                </a>

                <a href="pacientes.html">

                    <i class="fa-regular fa-user"></i>

                    <span>Pacientes</span>

                </a>

                <a href="atendimentos.html">

                    <i class="fa-regular fa-calendar-check"></i>

                    <span>Atendimentos</span>

                </a>

                <a href="receituario.html">

                    <i class="fa-regular fa-file-lines"></i>

                    <span>Receituário</span>

                </a>

                <!-- ATIVO -->

                <a href="relatorios.html" class="active">

                    <i class="fa-regular fa-chart-bar"></i>

                    <span>Relatórios</span>

                </a>

                <a href="laudos.html">

                    <i class="fa-regular fa-file"></i>

                    <span>Laudos</span>

                </a>

                <a href="login.html">

                    <i class="fa-solid fa-arrow-right-from-bracket"></i>

                    <span>Sair</span>

                </a>

            </nav>

        </aside>

        <!-- MAIN -->

        <main class="main">

            <!-- CARD -->

            <div class="card-relatorios">

                <!-- TÍTULO -->

                <h1>

                    Relatórios

                </h1>

                <!-- FORM -->

                <form id="formRelatorio">

                    <!-- LINHA -->

                    <div class="linha">

                        <!-- TIPO -->

                        <div class="grupo">

                            <label>

                                Tipo de Relatório

                            </label>

                            <select id="tipoRelatorio">

                                <option value="">
                                    Selecione o relatório
                                </option>

                                <option>
                                    Atendimentos por período
                                </option>

                                <option>
                                    Atendimentos por dentista
                                </option>

                                <option>
                                    Pacientes atendidos
                                </option>

                                <option>
                                    Procedimentos realizados
                                </option>

                            </select>

                        </div>

                        <!-- PERÍODO -->

                        <div class="grupo">

                            <label>

                                Período

                            </label>

                            <select id="periodo">

                                <option>
                                    Este mês
                                </option>

                                <option>
                                    Últimos 7 dias
                                </option>

                                <option>
                                    Últimos 30 dias
                                </option>

                                <option>
                                    Este ano
                                </option>

                            </select>

                        </div>

                    </div>

                    <!-- DATAS -->

                    <div class="linha linha-data">

                        <!-- DATA INICIAL -->

                        <div class="grupo">

                            <label>

                                Data inicial

                            </label>

                            <div class="input-data">

                                <input type="date" id="dataInicial">

                                <i class="fa-regular fa-calendar"></i>

                            </div>

                        </div>

                        <!-- DATA FINAL -->

                        <div class="grupo">

                            <label>

                                Data final

                            </label>

                            <div class="input-data">

                                <input type="date" id="dataFinal">

                                <i class="fa-regular fa-calendar"></i>

                            </div>

                        </div>

                        <!-- BOTÃO -->

                        <div class="grupo grupo-botao">

                            <button type="submit" class="btn-gerar">

                                GERAR RELATÓRIO

                            </button>

                        </div>

                    </div>

                </form>

                <!-- RELATÓRIOS -->

                <div class="lista-relatorios">

                    <h2>

                        Relatórios disponíveis

                    </h2>

                    <!-- ITEM -->

                    <div class="item-relatorio">

                        <div class="info">

                            <i class="fa-regular fa-file-lines verde"></i>

                            <span>
                                Atendimentos por período
                            </span>

                        </div>

                        <button onclick="gerarRelatorio('Atendimentos por período')">

                            GERAR

                        </button>

                    </div>

                    <!-- ITEM -->

                    <div class="item-relatorio">

                        <div class="info">

                            <i class="fa-regular fa-file-lines azul"></i>

                            <span>
                                Atendimentos por dentista
                            </span>

                        </div>

                        <button onclick="gerarRelatorio('Atendimentos por dentista')">

                            GERAR

                        </button>

                    </div>

                    <!-- ITEM -->

                    <div class="item-relatorio">

                        <div class="info">

                            <i class="fa-regular fa-file-lines roxo"></i>

                            <span>
                                Pacientes atendidos
                            </span>

                        </div>

                        <button onclick="gerarRelatorio('Pacientes atendidos')">

                            GERAR

                        </button>

                    </div>

                    <!-- ITEM -->

                    <div class="item-relatorio">

                        <div class="info">

                            <i class="fa-regular fa-file-lines rosa"></i>

                            <span>
                                Procedimentos realizados
                            </span>

                        </div>

                        <button onclick="gerarRelatorio('Procedimentos realizados')">

                            GERAR

                        </button>

                    </div>

                    <!-- ITEM -->

                    <div class="item-relatorio">

                        <div class="info">

                            <i class="fa-regular fa-file-lines laranja"></i>

                            <span>
                                Classificação de prioridades
                            </span>

                        </div>

                        <button onclick="gerarRelatorio('Classificação de prioridades')">

                            GERAR

                        </button>

                    </div>

                </div>

            </div>

        </main>

    </div>

    <script src="js/relatorios.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastrar Paciente</title>

    <!-- ÍCONES -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="css/global.css">

    <link rel="stylesheet" href="css/cadastrar-paciente.css">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <!-- LOGO -->

            <div class="logo">

                <img src="img/logo.png" alt="Logo">


            </div>

            <!-- MENU -->

            <nav class="menu">

                <a href="dashboard-publico.html">

                    <i class="fa-solid fa-tv"></i>

                    <span>Dashboard</span>

                </a>

                <a href="menu-principal.html">

                    <i class="fa-solid fa-house"></i>

                    <span>Menu Principal</span>

                </a>

                <a href="pacientes.html" class="active">

                    <i class="fa-regular fa-user"></i>

                    <span>Pacientes</span>

                </a>

                <a href="atendimentos.html">

                    <i class="fa-regular fa-calendar-check"></i>

                    <span>Atendimentos</span>

                </a>

                <a href="receituario.html">

                    <i class="fa-regular fa-file-lines"></i>

                    <span>Receituário</span>

                </a>

                <a href="relatorios.html">

                    <i class="fa-regular fa-chart-bar"></i>

                    <span>Relatórios</span>

                </a>

                <a href="laudos.html">

                    <i class="fa-regular fa-file"></i>

                    <span>Laudos</span>

                </a>

                <a href="login.html">

                    <i class="fa-solid fa-arrow-right-from-bracket"></i>

                    <span>Sair</span>

                </a>

            </nav>

        </aside>

        <!-- MAIN -->

        <main class="main">

            <!-- CARD -->

            <div class="card-cadastro">

                <!-- TÍTULO -->

                <h1>

                    Cadastrar Paciente

                </h1>

                <!-- FORM -->

                <form id="formPaciente">

                    <!-- LINHA 1 -->

                    <div class="linha">

                        <!-- NOME -->

                        <div class="grupo">

                            <label>

                                Nome Completo

                            </label>

                            <input type="text" id="nome" placeholder="Digite o nome completo">

                        </div>

                        <!-- NASCIMENTO -->

                        <div class="grupo">

                            <label>

                                Data de Nascimento

                            </label>

                            <div class="input-data">

                                <input type="date" id="nascimento">

                                <i class="fa-regular fa-calendar"></i>

                            </div>

                        </div>

                    </div>

                    <!-- LINHA 2 -->

                    <div class="linha">

                        <!-- CPF -->

                        <div class="grupo">

                            <label>

                                CPF

                            </label>

                            <input type="text" id="cpf" placeholder="000.000.000-00">

                        </div>

                        <!-- TELEFONE -->

                        <div class="grupo">

                            <label>

                                Telefone

                            </label>

                            <input type="text" id="telefone" placeholder="(00) 00000-0000">

                        </div>

                    </div>

                    <!-- LINHA 3 -->

                    <div class="linha">

                        <!-- ENDEREÇO -->

                        <div class="grupo">

                            <label>

                                Endereço

                            </label>

                            <input type="text" id="endereco" placeholder="Digite o endereço">

                        </div>

                        <!-- BAIRRO -->

                        <div class="grupo">

                            <label>

                                Bairro

                            </label>

                            <input type="text" id="bairro" placeholder="Digite o bairro">

                        </div>

                    </div>

                    <!-- LINHA 4 -->

                    <div class="linha">

                        <!-- CARTÃO SUS -->

                        <div class="grupo">

                            <label>

                                Cartão SUS

                            </label>

                            <input type="text" id="sus" placeholder="0000 0000 0000 0000">

                        </div>

                        <!-- EMAIL -->

                        <div class="grupo">

                            <label>

                                E-mail

                            </label>

                            <input type="email" id="email" placeholder="Digite o e-mail">

                        </div>

                    </div>

                    <!-- RESPONSÁVEL -->

                    <div class="grupo">

                        <label>

                            Responsável (se menor)

                        </label>

                        <input type="text" id="responsavel" placeholder="Digite o nome do responsável">

                    </div>

                    <!-- BOTÕES -->

                    <div class="acoes">

                        <button type="reset" class="btn-cancelar">

                            CANCELAR

                        </button>

                        <button type="submit" class="btn-salvar">

                            SALVAR

                        </button>

                    </div>

                </form>

            </div>

        </main>

    </div>

    <script src="js/cadastrar-paciente.js"></script>

</body>

</html>

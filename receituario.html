<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Receituário</title>

    <!-- ÍCONES -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="css/global.css">

    <link rel="stylesheet" href="css/receituario.css">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <!-- LOGO -->

            <div class="logo">

                <img src="img/logo.png" alt="Logo">

            </div>

            <!-- MENU -->

            <nav class="menu">

                <a href="dashboard-publico.html">

                    <i class="fa-solid fa-tv"></i>

                    <span>Dashboard</span>

                </a>

                <a href="menu-principal.html">

                    <i class="fa-solid fa-house"></i>

                    <span>Menu Principal</span>

                </a>

                <a href="pacientes.html">

                    <i class="fa-regular fa-user"></i>

                    <span>Pacientes</span>

                </a>

                <a href="atendimentos.html">

                    <i class="fa-regular fa-calendar-check"></i>

                    <span>Atendimentos</span>

                </a>

                <!-- ATIVO -->

                <a href="receituario.html" class="active">

                    <i class="fa-regular fa-file-lines"></i>

                    <span>Receituário</span>

                </a>

                <a href="relatorios.html">

                    <i class="fa-regular fa-chart-bar"></i>

                    <span>Relatórios</span>

                </a>

                <a href="laudos.html">

                    <i class="fa-regular fa-file"></i>

                    <span>Laudos</span>

                </a>

                <a href="login.html">

                    <i class="fa-solid fa-arrow-right-from-bracket"></i>

                    <span>Sair</span>

                </a>

            </nav>

        </aside>

        <!-- MAIN -->

        <main class="main">

            <!-- CARD -->

            <div class="card-receituario">

                <!-- TÍTULO -->

                <h1>

                    Novo Receituário

                </h1>

                <!-- FORM -->

                <form id="formReceituario">

                    <!-- LINHA -->

                    <div class="linha">

                        <!-- PACIENTE -->

                        <div class="grupo">

                            <label>
                                Paciente
                            </label>

                            <select id="paciente">

                                <option value="">
                                    Selecione o paciente
                                </option>

                                <option>
                                    Maria da Silva
                                </option>

                                <option>
                                    João Pedro Souza
                                </option>

                                <option>
                                    Ana Paula Santos
                                </option>

                            </select>

                        </div>

                        <!-- DATA -->

                        <div class="grupo">

                            <label>
                                Data
                            </label>

                            <div class="input-data">

                                <input type="date" id="data">

                                <i class="fa-regular fa-calendar"></i>

                            </div>

                        </div>

                    </div>

                    <!-- MEDICAMENTO -->

                    <div class="grupo">

                        <label>
                            Medicamento / Prescrição
                        </label>

                        <textarea id="prescricao" placeholder="Digite o medicamento ou prescrição..."></textarea>

                    </div>

                    <!-- ORIENTAÇÕES -->

                    <div class="grupo">

                        <label>
                            Orientações
                        </label>

                        <textarea id="orientacoes" placeholder="Digite as orientações..."></textarea>

                    </div>

                    <!-- BOTÕES -->

                    <div class="acoes">

                        <button type="reset" class="btn-limpar">

                            LIMPAR

                        </button>

                        <button type="submit" class="btn-salvar">

                            SALVAR / IMPRIMIR

                        </button>

                    </div>

                </form>

            </div>

        </main>

    </div>

    <script src="js/receituario.js"></script>

</body>

</html>

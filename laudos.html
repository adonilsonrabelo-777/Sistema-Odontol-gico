<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Laudos</title>

    <!-- ÍCONES -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
    href="css/global.css">

    <link rel="stylesheet"
    href="css/laudos.css">

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <!-- LOGO -->

        <div class="logo">

            <img
            src="img/logo.png"
            alt="Logo">

        </div>

        <!-- MENU -->

        <nav class="menu">

            <a href="dashboard-publico.html">

                <i class="fa-solid fa-tv"></i>

                <span>Dashboard</span>

            </a>

            <a href="menu-principal.html">

                <i class="fa-solid fa-house"></i>

                <span>Menu Principal</span>

            </a>

            <a href="pacientes.html">

                <i class="fa-regular fa-user"></i>

                <span>Pacientes</span>

            </a>

            <a href="atendimentos.html">

                <i class="fa-regular fa-calendar-check"></i>

                <span>Atendimentos</span>

            </a>

            <a href="receituario.html">

                <i class="fa-regular fa-file-lines"></i>

                <span>Receituário</span>

            </a>

            <a href="relatorios.html">

                <i class="fa-regular fa-chart-bar"></i>

                <span>Relatórios</span>

            </a>

            <!-- ATIVO -->

            <a
            href="laudos.html"
            class="active">

                <i class="fa-regular fa-file"></i>

                <span>Laudos</span>

            </a>

            <a href="login.html">

                <i class="fa-solid fa-arrow-right-from-bracket"></i>

                <span>Sair</span>

            </a>

        </nav>

    </aside>

    <!-- MAIN -->

    <main class="main">

        <!-- CARD -->

        <div class="card-laudos">

            <!-- TÍTULO -->

            <h1>

                Novo Laudo

            </h1>

            <!-- FORM -->

            <form id="formLaudo">

                <!-- LINHA -->

                <div class="linha">

                    <!-- PACIENTE -->

                    <div class="grupo">

                        <label>

                            Paciente

                        </label>

                        <select id="paciente">

                            <option value="">
                                Selecione o paciente
                            </option>

                            <option>
                                Maria da Silva
                            </option>

                            <option>
                                João Pedro Souza
                            </option>

                            <option>
                                Ana Paula Santos
                            </option>

                        </select>

                    </div>

                    <!-- DATA -->

                    <div class="grupo">

                        <label>

                            Data

                        </label>

                        <div class="input-data">

                            <input
                            type="date"
                            id="data">

                            <i class="fa-regular fa-calendar"></i>

                        </div>

                    </div>

                </div>

                <!-- TIPO -->

                <div class="grupo">

                    <label>

                        Tipo de Laudo

                    </label>

                    <select id="tipoLaudo">

                        <option value="">
                            Selecione o tipo de laudo
                        </option>

                        <option>
                            Avaliação Odontológica
                        </option>

                        <option>
                            Laudo Clínico
                        </option>

                        <option>
                            Encaminhamento
                        </option>

                        <option>
                            Procedimento Realizado
                        </option>

                    </select>

                </div>

                <!-- DESCRIÇÃO -->

                <div class="grupo">

                    <label>

                        Descrição / Observações

                    </label>

                    <textarea
                    id="descricao"
                    placeholder="Digite a descrição do laudo..."></textarea>

                </div>

                <!-- BOTÕES -->

                <div class="acoes">

                    <button
                    type="reset"
                    class="btn-limpar">

                        LIMPAR

                    </button>

                    <button
                    type="submit"
                    class="btn-salvar">

                        SALVAR / IMPRIMIR

                    </button>

                </div>

            </form>

        </div>

    </main>

</div>

<script src="js/laudos.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Usuário</title>

    <link rel="stylesheet" href="css/cadastro-usuario.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="login-box">

            <!-- FORMULÁRIO -->
            <div class="left-side">

                <h2 class="titulo-login">
                    CADASTRAR USUÁRIO
                </h2>

                <img src="img/logo.png" alt="Logo" class="logo">

                <form id="cadastroForm">

                    <!-- NOME -->
                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>

                        <input type="text" id="nome" placeholder="Nome completo" required>
                    </div>

                    <!-- EMAIL -->
                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>

                        <input type="email" id="email" placeholder="E-mail" required>
                    </div>

                    <!-- TIPO -->
                    <div class="input-box">

                        <i class="fa-solid fa-user-doctor"></i>

                        <select id="tipoUsuario" required>

                            <option value="">
                                Selecione o tipo de usuário
                            </option>

                            <option value="dentista">
                                Médico(a) Dentista
                            </option>

                            <option value="atendente">
                                Atendente Credenciado(a)
                            </option>

                        </select>

                    </div>

                    <!-- CRO / CRACHÁ -->
                    <div class="input-box">

                        <i class="fa-solid fa-id-card"></i>

                        <input type="text" id="registro" placeholder="Informe o CRO ou nº do crachá" required>

                    </div>

                    <!-- SENHA -->
                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input type="password" id="novaSenha" placeholder="Senha" required>

                    </div>

                    <!-- BOTÃO -->
                    <button type="submit" class="btn-login">

                        SALVAR

                    </button>

                    <!-- VOLTAR -->
                    <a href="login.html" class="btn-cadastrar">

                        VOLTAR

                    </a>

                </form>

            </div>

            <!-- IMAGEM -->
            <div class="right-side">

                <img src="img/clinica.png" alt="Clínica">

            </div>

        </div>

    </div>

    <script src="js/cadastro-usuario.js"></script>

</body>

</html>

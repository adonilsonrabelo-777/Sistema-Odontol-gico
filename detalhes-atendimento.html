<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Detalhes do Atendimento</title>

    <!-- ÍCONES -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS GLOBAL -->

    <link rel="stylesheet" href="css/global.css">

    <!-- CSS DA TELA -->

    <link rel="stylesheet" href="css/detalhes-atendimento.css">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="logo">

                <img src="img/logo.png" alt="Logo SaúdeTECH">

            </div>

            <nav class="menu">

                <a href="dashboard-publico.html">

                    <i class="fa-solid fa-tv"></i>
                    <span>Dashboard</span>

                </a>

                <a href="menu-principal.html">

                    <i class="fa-solid fa-house"></i>
                    <span>Menu Principal</span>

                </a>

                <a href="pacientes.html">

                    <i class="fa-regular fa-user"></i>
                    <span>Pacientes</span>

                </a>

                <a href="atendimentos.html" class="active">

                    <i class="fa-regular fa-calendar-check"></i>
                    <span>Atendimentos</span>

                </a>

                <a href="receituario.html">

                    <i class="fa-regular fa-file-lines"></i>
                    <span>Receituário</span>

                </a>

                <a href="relatorios.html">

                    <i class="fa-regular fa-chart-bar"></i>
                    <span>Relatórios</span>

                </a>

                <a href="laudos.html">

                    <i class="fa-regular fa-file"></i>
                    <span>Laudos</span>

                </a>

                <a href="login.html">

                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Sair</span>

                </a>

            </nav>

        </aside>

        <!-- MAIN -->

        <main class="main">

            <div class="card-atendimento">

                <!-- TOPO -->

                <div class="topo">

                    <h1>Dados do Atendimento</h1>

                    <a href="atendimentos.html" class="btn-voltar">

                        <i class="fa-solid fa-arrow-left"></i>
                        VOLTAR

                    </a>

                </div>

                <!-- BOX PRINCIPAL -->

                <div class="box-atendimento">

                    <!-- LINHA 1 -->

                    <div class="linha-topo">

                        <div class="item">

                            <label>Paciente:</label>
                            <span id="nomePaciente"></span>

                        </div>

                        <div class="item">

                            <label>Data:</label>
                            <span id="dataAtendimento"></span>

                        </div>

                    </div>

                    <!-- LINHA 2 -->

                    <div class="linha-topo">

                        <div class="item">

                            <label>CPF:</label>
                            <span id="cpfPaciente"></span>

                        </div>

                        <div class="item">

                            <label>Dentista:</label>
                            <span id="dentista"></span>

                        </div>

                    </div>

                    <!-- LINHA 3 -->

                    <div class="linha-topo">

                        <div class="item">

                            <label>Telefone:</label>
                            <span id="telefonePaciente"></span>

                        </div>

                        <div class="item">

                            <label>Prioridade:</label>

                            <span class="prioridade" id="prioridade">

                            </span>

                        </div>

                    </div>

                    <!-- LINHA 4 -->

                    <div class="linha-topo">

                        <div class="item">

                            <label>Idade:</label>
                            <span id="idadePaciente"></span>

                        </div>

                    </div>

                </div>

                <!-- QUEIXA -->

                <div class="card-info">

                    <h3>

                        <i class="fa-solid fa-tooth"></i>

                        Queixa principal

                    </h3>

                    <p id="queixaPrincipal"></p>

                </div>

                <!-- PROCEDIMENTOS -->

                <div class="card-info">

                    <h3>

                        <i class="fa-regular fa-file-lines"></i>

                        Procedimentos realizados

                    </h3>

                    <p id="procedimentos"></p>

                </div>

                <!-- OBSERVAÇÕES -->

                <div class="card-info">

                    <h3>

                        <i class="fa-regular fa-comment"></i>

                        Observações

                    </h3>

                    <p id="observacoes"></p>

                </div>

                <!-- BOTÕES -->

                <div class="acoes">

                    <button class="btn-editar">

                        EDITAR

                    </button>

                    <button class="btn-excluir">

                        EXCLUIR

                    </button>

                </div>

            </div>

        </main>

    </div>

    <script src="js/detalhes-atendimento.js"></script>

</body>

</html>
